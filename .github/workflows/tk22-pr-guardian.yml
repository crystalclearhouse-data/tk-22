name: TK22 PR Guardian

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  notify_n8n:
    runs-on: ubuntu-latest

    steps:
      - name: Send PR event to n8n
        env:
          N8N_WEBHOOK_URL: ${{ secrets.N8N_TK22_PR_WEBHOOK }}
        run: |
          if [ -z "$N8N_WEBHOOK_URL" ]; then
            echo "❌ Missing N8N webhook URL"
            exit 1
          fi

          REPO="${{ github.repository }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          BRANCH="${{ github.event.pull_request.head.ref }}"
          COMMIT="${{ github.event.pull_request.head.sha }}"
          AUTHOR="${{ github.event.pull_request.user.login }}"
          TIMESTAMP="${{ github.event.pull_request.updated_at }}"

          for attempt in 1 2 3; do
            echo "Sending PR event to n8n (attempt ${attempt})..."
            payload="$(python - << 'PY'
import json
import os

data = {
    "event": "pull_request",
    "repo": os.environ["REPO"],
    "pr_number": os.environ["PR_NUMBER"],
    "branch": os.environ["BRANCH"],
    "commit": os.environ["COMMIT"],
    "author": os.environ["AUTHOR"],
    "timestamp": os.environ["TIMESTAMP"],
}

print(json.dumps(data))
PY
)"
            if curl --fail-with-body -X POST "$N8N_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "$payload"; then
              echo "✅ PR event delivered to n8n"
              break
            else
              echo "⚠️ Failed to deliver PR event to n8n (attempt ${attempt})"
              if [ "$attempt" -lt 3 ]; then
                sleep $((attempt * 5))
              else
                echo "❌ Giving up after ${attempt} failed attempts"
                exit 1
              fi
            fi
          done
