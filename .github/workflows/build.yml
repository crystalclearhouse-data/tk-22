name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '16'

    - name: Install Node.js dependencies
      run: |
        npm install

    - name: Run ESLint
      run: |
        npx eslint .

    - name: Run Prettier
      run: |
        npx prettier --check .

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        pip install -r requirements.txt

    - name: Run Pylint
      run: |
        pylint **/*.py

    - name: Run JavaScript tests
      run: |
        npm test

    - name: Run Python tests
      run: |
        pytest