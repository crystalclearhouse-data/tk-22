name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '16'

    - name: Install Node.js dependencies
      run: |
        if [ -f "package.json" ]; then
          npm install
        else
          echo "No package.json found, skipping npm install"
        fi

    - name: Run ESLint
      run: |
        if [ -f "package.json" ]; then
          npx eslint .
        else
          echo "No package.json found, skipping ESLint"
        fi

    - name: Run Prettier
      run: |
        if [ -f "package.json" ]; then
          npx prettier --check .
        else
          echo "No package.json found, skipping Prettier"
        fi

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        if [ -f "requirements.txt" ]; then
          pip install -r requirements.txt
        else
          echo "No requirements.txt found, skipping Python dependencies"
        fi

    - name: Run Pylint
      run: |
        if [ -f "requirements.txt" ] && find . -name "*.py" -type f | head -1 | grep -q .; then
          pylint **/*.py || echo "Pylint completed with warnings/errors"
        else
          echo "No Python files found or requirements.txt missing, skipping Pylint"
        fi

    - name: Run JavaScript tests
      run: |
        if [ -f "package.json" ]; then
          npm test
        else
          echo "No package.json found, skipping JavaScript tests"
        fi

    - name: Run Python tests
      run: |
        if [ -f "requirements.txt" ] && find . -name "test_*.py" -o -name "*_test.py" | head -1 | grep -q .; then
          pytest || echo "Tests completed with failures"
        else
          echo "No Python test files found or requirements.txt missing, skipping Python tests"
        fi
