name: TK-22 Control Execute

on:
  workflow_dispatch:
  repository_dispatch:
    types: [tk22_execute]

jobs:
  execute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run TK-22
        run: python3 control/runtime/tk22_execute.py

      - name: Upload proofs
        uses: actions/upload-artifact@v4
        with:
          name: tk22-proofs
          path: control/proofs/
