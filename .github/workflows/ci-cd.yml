name: TK-22 CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: tk-22
  REGISTRY: ghcr.io
  IMAGE_PATH: ghcr.io/crystalclearhouse-data/tk-22

jobs:

  # Job 1: Lint & Test
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node deps
        run: npm ci

      - name: Run ESLint
        run: npx eslint . --ext .ts,.js --max-warnings=0

      - name: Run Prettier check
        run: npx prettier --check .

      - name: Run JS/TS tests
        run: npm test

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Run Pylint
        run: pylint backend/ agents/ --fail-under=8.0

      - name: Run Pytest
        run: pytest --tb=short

  # Job 2: Build & Push Docker image
  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: lint-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      short_sha: ${{ steps.sha.outputs.short }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PATH }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 3: Deploy to Staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/dev'
    environment: staging
    steps:
      - name: Deploy to Cloud Run staging
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: tk-22-staging
          region: us-west1
          image: ${{ env.IMAGE_PATH }}:dev
          env_vars: NODE_ENV=staging
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GCP_SA_KEY }}

      - name: Staging health check
        run: |
          sleep 15
          curl -f ${{ secrets.STAGING_URL }}/health || exit 1

      - name: Notify HITL staging ready
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: 1,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ **Staging deploy complete** — SHA: \`${{ needs.build-push.outputs.short_sha }}\`\nURL: ${{ secrets.STAGING_URL }}\n\nApprove the **production** environment in GitHub to go live.`
            })

  # Job 4: Deploy to Production (HITL gate)
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Deploy to Cloud Run prod
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: tk-22-prod
          region: us-west1
          image: ${{ env.IMAGE_PATH }}:latest
          env_vars: NODE_ENV=production
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GCP_SA_KEY }}

      - name: Production health check
        run: |
          sleep 20
          curl -f ${{ secrets.PROD_URL }}/health || exit 1

      - name: Tag release
        run: |
          git tag "release-$(date +%Y%m%d-%H%M%S)"
          git push --tags
